<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Digital Platform</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #664930;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            max-width: 1000px;
        }

        .header-title {
            background: #664930;
            color: white;
            padding: 10px 30px;
            border-radius: 8px;
            display: inline-block;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 10px;    
        }

        .header-container p {
            color: rgb(195, 170, 170);
            font-size: 16px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: #d8d6d6;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(3, 3, 3, 0.05);
            transition: transform 0.2s;
            cursor: pointer;
        }

    

        @media (max-width: 800px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-title">Notebooks</div>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>Language</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr Valdez</p>
            <div class="bar"></div>
        </div>

        <div class="card">
            <h3>Geography</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr Villante</p>
            <div class="bar"></div>
        </div>

        <div class="card">
            <h3>Geometry</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr. Conception</p>
            <div class="bar"></div>
        </div>

        <div class="card">
            <h3>Botany</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr. Jimenez</p>
            <div class="bar"></div>
        </div>

        <div class="card">
            <h3>History</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr. Dela Fuente</p>
            <div class="bar"></div>
        </div>

        <div class="card">
            <h3>Character Education</h3>
            <p>9-Onyx 2025-2026</p>
            <p>Mr. Mercado</p>
            <div class="bar"></div>
        </div>
    </div>

</body>
</html>
